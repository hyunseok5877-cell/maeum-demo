name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Django · migrate + check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install django-summernote
      - name: Django check
        run: python manage.py check
      - name: Django migrate (sqlite)
        run: python manage.py migrate --noinput
      - name: Seed data
        run: python manage.py seed_maeum

  frontend:
    name: Next.js · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      # Backend setup
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install backend deps
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install django-summernote
      - name: Migrate + seed
        working-directory: api
        run: |
          python manage.py migrate --noinput
          python manage.py seed_maeum
          # Apply demo discount used by E2E test
          python manage.py shell -c "from experiences.models import Experience; e=Experience.objects.get(slug='ferrari-sunset-namsan'); e.discount_percentage=15; e.save()"
      - name: Start Django
        working-directory: api
        run: |
          nohup python manage.py runserver 8000 > /tmp/django.log 2>&1 &
          for i in {1..30}; do curl -sf http://localhost:8000/api/health/ && break; sleep 1; done

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend deps
        working-directory: web
        run: npm ci
      - name: Build Next.js
        working-directory: web
        run: npm run build
      - name: Start Next.js
        working-directory: web
        env:
          PORT: 3001
        run: |
          nohup npm run start -- -p 3001 > /tmp/next.log 2>&1 &
          for i in {1..30}; do curl -sf http://localhost:3001/ > /dev/null && break; sleep 1; done

      # E2E
      - name: Install e2e deps
        working-directory: e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: e2e
        env:
          CI: "true"
          BASE_URL: http://localhost:3001
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14
